name: Run Scraper Daily

on:
  schedule:
    - cron: '0 0 * * *' # Roda todos os dias à meia-noite (UTC)
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai pydantic

    - name: Run scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add editais.json status.json
        # Apenas commita se houverem arquivos modificados
        git commit -m "Automated editais scraping update" || echo "No changes to commit"
        git push || echo "No changes to push"
